<div class="login-bg">

    <!-- === ORBITAL LIGHT CARD WRAPPER === -->
    <div class="card-wrapper">

        <!-- The neon orb that orbits around the card -->
        <div class="orbit-orb"></div>

        <!-- === LOGIN CARD - Liquid Glass === -->
        <main class="login-card">

            <!-- All card content wrapped for z-index stacking over glass sheen -->
            <div class="card-content">

                <!-- Logo -->
                <header style="display:flex;flex-direction:column;align-items:center;gap:0.5rem;margin-bottom:2rem;width:100%;">
                    <img src="/Images/nodeMesh_white.png" alt="NodeMesh" style="height:30px;width:auto;object-fit:contain;">
                    <span style="color:#9ACD32;font-size:9px;font-weight:700;letter-spacing:0.25em;text-transform:uppercase;font-family:'JetBrains Mono',monospace;">Herramienta de Estudio</span>
                </header>

                <!-- Headline -->
                <div style="text-align:center;margin-bottom:2rem;width:100%;">
                    <h1 style="font-size:1.3rem;font-weight:600;line-height:1.55;color:rgba(255,255,255,0.92);margin-bottom:0.3rem;font-family:'JetBrains Mono',monospace;">
                        Destruye la ilusión<br>de competencia.
                    </h1>
                    <h2 style="font-size:1.05rem;font-weight:700;color:#9ACD32;font-family:'JetBrains Mono',monospace;">
                        Forja conocimiento real.
                    </h2>
                </div>

                <!-- Google Login -->
                <div style="width:100%;display:flex;flex-direction:column;gap:0.65rem;margin-bottom:1.25rem;">
                    <button class="btn-google" (click)="onGoogleLogin()">
                        <svg style="width:18px;height:18px;flex-shrink:0;" viewBox="0 0 24 24">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#000"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#000"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#000"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#000"/>
                        </svg>
                        Inicia Sesión con Google
                    </button>

                    <div style="display:flex;align-items:center;justify-content:center;gap:6px;color:rgba(255,255,255,0.28);font-size:8px;letter-spacing:0.2em;text-transform:uppercase;font-family:'JetBrains Mono',monospace;">
                        Plataforma de Acceso Seguro
                        <svg style="width:11px;height:11px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                        </svg>
                    </div>
                </div>

                <!-- Divider -->
                <div style="width:100%;height:1px;background:rgba(154,205,50,0.08);margin-bottom:1.25rem;"></div>

                <!-- GitHub -->
                <a href="#" style="color:rgba(255,255,255,0.35);" title="GitHub">
                    <svg style="width:20px;height:20px;" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                    </svg>
                </a>

            </div><!-- /card-content -->
        </main>
    </div><!-- /card-wrapper -->

    <!-- Watermark bottom-left -->
    <div class="watermark">
        <span class="watermark-label">Desarrollado por:</span>
        <img src="/Images/maikdev.png" alt="Maik.dev" class="watermark-logo">
    </div>

    <!-- Version bottom center -->
    <div class="version-tag">v0.0.1</div>

</div>
