<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>NodeMesh — Herramienta de Estudio</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <!-- Content Security Policy (Compensating control for SRI on dynamic Google services) -->
  <meta http-equiv="Content-Security-Policy" 
        content="default-src 'self'; 
                 script-src 'self' https://accounts.google.com/gsi/client https://cdnjs.cloudflare.com; 
                 style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; 
                 font-src 'self' https://fonts.gstatic.com; 
                 frame-src https://accounts.google.com; 
                 connect-src 'self' https://accounts.google.com https://www.googleapis.com https://*.google.com https://generativelanguage.googleapis.com https://cdnjs.cloudflare.com; 
                 worker-src 'self' blob:; 
                 img-src 'self' data: https://*.googleusercontent.com;">
  <!-- Google Identity Services Requirements (SRI not recommended for dynamic gsi/client) -->
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <!-- Google Fonts: Inter & Fira Code -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <!-- Material Symbols Rounded -->
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>

<body>
  <app-root></app-root>
</body>

</html>
