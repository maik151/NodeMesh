<div class="byok-container">
    <div class="glass-modal">
        <div class="modal-header">
            <span class="material-symbols-rounded icon-hero">security</span>
            <h2>Bóveda BYOK</h2>
            <p>Configura tu API Key para habilitar la simulación cognitiva. Aseguraremos la llave localmente mediante
                AES-GCM 256 usando tu identidad aislada.</p>
        </div>

        <form class="byok-form" (ngSubmit)="onSaveKey()">
            <div class="input-group">
                <label for="apiKey">Proveedor: Google Gemini</label>
                <div class="input-wrapper">
                    <span class="material-symbols-rounded input-icon">key</span>
                    <input type="password" id="apiKey" name="apiKey" [(ngModel)]="apiKey" placeholder="AIzaSy..."
                        [disabled]="isTestLoading || isSaveLoading || apiTestedSuccessfully" required spellcheck="false"
                        autocomplete="off" />
                </div>
            </div>

            <div class="error-msg" *ngIf="errorMessage">
                <span class="material-symbols-rounded">error</span>
                {{ errorMessage }}
            </div>

            <div class="actions-group">
                <!-- Test API Button -->
                <button type="button" class="btn-test" [class.is-success]="apiTestedSuccessfully"
                    [disabled]="!apiKey || isTestLoading || apiTestedSuccessfully || isSaveLoading"
                    (click)="onTestKey()">
                    <ng-container *ngIf="!isTestLoading && !apiTestedSuccessfully">
                        <span class="material-symbols-rounded">satellite_alt</span>
                        Probar Conexión
                    </ng-container>
                    <ng-container *ngIf="isTestLoading">
                        <div class="spinner"></div>
                        Haciendo ping...
                    </ng-container>
                    <ng-container *ngIf="apiTestedSuccessfully">
                        <span class="material-symbols-rounded">check_circle</span>
                        Conexión Exitosa
                    </ng-container>
                </button>

                <!-- Save/Encrypt Button -->
                <button type="submit" class="btn-primary" [class.is-success]="isSaveSuccess"
                    [disabled]="!apiTestedSuccessfully || isSaveLoading || isSaveSuccess">
                    <ng-container *ngIf="!isSaveLoading && !isSaveSuccess">
                        <span class="material-symbols-rounded">lock</span>
                        Cifrar y Guardar Bóveda
                    </ng-container>
                    <ng-container *ngIf="isSaveLoading">
                        <div class="spinner"></div>
                        Asegurando...
                    </ng-container>
                    <ng-container *ngIf="isSaveSuccess">
                        <span class="material-symbols-rounded">verified_user</span>
                        Bóveda Segura
                    </ng-container>
                </button>

                <button type="button" class="btn-skip" (click)="onSkipSetup()">
                    Omitir por ahora
                </button>
            </div>
        </form>
    </div>

</div>
